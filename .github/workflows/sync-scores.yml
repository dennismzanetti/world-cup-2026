# .github/workflows/sync-scores.yml
# Polls the ESPN public API for live/finished World Cup 2026 scores
# and writes them to Firestore so the web app updates in real time.
#
# Schedule: every 5 minutes (GitHub Actions minimum cron interval).
# Also runs on every push to main (e.g. after a page refresh/deployment).
#
# Required GitHub Secret:
#   FIREBASE_SERVICE_ACCOUNT_JSON   — full JSON of a Firebase service account
#                                     with Firestore read/write permissions
#
# Manual triggers (workflow_dispatch inputs):
#   force_reseed  — delete all match docs and re-seed from scratch
#   debug         — dump Firestore docs + ESPN team names, then exit (no writes)
#   repair_pk     — re-check all finished tied knockout matches and write
#                   missing homePkScore/awayPkScore values from ESPN

name: Sync Live Scores

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_reseed:
        description: 'Force delete + reseed all matches from scratch'
        type: boolean
        default: false
      debug:
        description: 'Debug mode: dump Firestore docs + ESPN names (no writes)'
        type: boolean
        default: false
      repair_pk:
        description: 'Repair PK: backfill missing PK scores on finished tied knockout matches'
        type: boolean
        default: false
  repository_dispatch:
    types: [sync-scores]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Fetch & write live scores
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sync/package.json

      - name: Install sync dependencies
        working-directory: sync
        run: npm install

      - name: Run live-scores sync
        working-directory: sync
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_reseed }}" = "true" ]; then
            ARGS="$ARGS --force-reseed"
          fi
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            ARGS="$ARGS --debug"
          fi
          if [ "${{ github.event.inputs.repair_pk }}" = "true" ]; then
            ARGS="$ARGS --repair-pk"
          fi
          node live-scores.js $ARGS
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
