<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seed Firestore Matches</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #111; color: #ccc; }
    h2   { color: #fff; }
    #login-form { display: flex; flex-direction: column; gap: .75rem; max-width: 320px; margin-bottom: 2rem; }
    #login-form input  { padding: .5rem .75rem; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; font-size: 1rem; }
    #login-form button { padding: .5rem 1rem; border-radius: 6px; border: none; background: #0a84ff; color: #fff; font-size: 1rem; cursor: pointer; }
    #login-error { color: #f55; min-height: 1.2rem; }
    #btn-reseed { padding: .75rem 1.5rem; border-radius: 6px; border: none; background: #ff453a; color: #fff; font-size: 1.1rem; cursor: pointer; font-family: monospace; font-weight: bold; display: none; }
    #btn-reseed:disabled { opacity: .4; cursor: not-allowed; }
    #log { white-space: pre-wrap; margin-top: 1.5rem; line-height: 1.6; }
    .done  { color: #0f0; font-weight: bold; }
    .error { color: #f55; font-weight: bold; }
    .info  { color: #aaa; }
    .warn  { color: #fa0; }
    .uid   { color: #7df; font-weight: bold; }
  </style>
</head>
<body>
  <h2>🌍 Firestore Match Seeder</h2>
  <p class="info">Sign in, then click Re-seed to delete all existing matches and write all 107 fresh.</p>

  <form id="login-form">
    <input id="email"    type="email"    placeholder="Admin email"    required autocomplete="username">
    <input id="password" type="password" placeholder="Admin password" required autocomplete="current-password">
    <button type="submit">Sign In</button>
    <div id="login-error"></div>
  </form>

  <button id="btn-reseed">⚠️ Delete All &amp; Re-seed All Matches (72 group + 35 knockout)</button>

  <div id="log"></div>

  <script type="module">
    import { signInWithEmailAndPassword, getIdTokenResult } from
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { auth } from './assets/firebase.js';
    import { reseedAllMatches } from './seed.js';

    const logEl  = document.getElementById('log');
    const errEl  = document.getElementById('login-error');
    const form   = document.getElementById('login-form');
    const btn    = document.getElementById('btn-reseed');

    const append = (msg, cls = 'info') => {
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    };

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.textContent = '';
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const signInBtn = form.querySelector('button');
      signInBtn.disabled = true;
      signInBtn.textContent = 'Signing in…';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const user = cred.user;
        form.hidden = true;
        btn.style.display = 'inline-block';

        append(`✓ Signed in as: ${user.email}`, 'done');
        append(`  UID: ${user.uid}`, 'uid');

        const EXPECTED_UID = 'rvR3HclRnhXAOd3rgk7sO0s3F7v1';
        if (user.uid === EXPECTED_UID) {
          append('  ✅ UID matches admin', 'done');
        } else {
          append('  ⚠️ UID does NOT match expected admin UID!', 'warn');
          append(`  Expected: ${EXPECTED_UID}`, 'warn');
          append(`  Got:      ${user.uid}`, 'warn');
        }

        btn.addEventListener('click', async () => {
          if (!confirm('This will DELETE all existing match documents and re-seed 107 matches from scratch. Continue?')) return;
          btn.disabled = true;
          btn.textContent = 'Seeding…';
          logEl.innerHTML = '';
          try {
            await reseedAllMatches(msg => append(msg, msg.startsWith('✅') || msg.startsWith('🎉') ? 'done' : msg.startsWith('⚠️') ? 'warn' : 'info'));
            btn.textContent = '✅ Done';
          } catch (err) {
            append('❌ ' + err.message, 'error');
            btn.disabled = false;
            btn.textContent = '⚠️ Delete All & Re-seed All Matches';
          }
        });

      } catch (err) {
        errEl.textContent = err.message;
        signInBtn.disabled = false;
        signInBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
