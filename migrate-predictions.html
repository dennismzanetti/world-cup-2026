const CANONICAL_IDS = new Set(CANONICAL_MATCHES.map(m => m.id));

// Build forward+reverse lookup: "date|homeslug|awayslug" → canonical ID
function slug(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}
const KEY_TO_CANONICAL = {};
CANONICAL_MATCHES.forEach(m => {
  if (!m.home) return;
  const datePart = m.id.split('-').slice(0,3).join('-');
  KEY_TO_CANONICAL[`${datePart}|${slug(m.home)}|${slug(m.away)}`] = m.id;
  KEY_TO_CANONICAL[`${datePart}|${slug(m.away)}|${slug(m.home)}`] = m.id;
});

function resolveCanonical(staleId) {
  if (CANONICAL_IDS.has(staleId)) return staleId;
  const m = staleId.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
  if (!m) return null;
  const datePart = m[1], parts = m[2].split('-');
  for (let i = 1; i < parts.length; i++) {
    const key = `${datePart}|${parts.slice(0,i).join('-')}|${parts.slice(i).join('-')}`;
    if (KEY_TO_CANONICAL[key]) return KEY_TO_CANONICAL[key];
  }
  return null;
}

// ── UI ────────────────────────────────────────────────────────────────────
const logEl      = document.getElementById('log');
const authStatus = document.getElementById('auth-status');
const dryRunBtn  = document.getElementById('dry-run-btn');
const migrateBtn = document.getElementById('migrate-btn');
const uidListEl  = document.getElementById('uid-list');

function log(msg, cls='') {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

onAuthStateChanged(auth, user => {
  if (user) {
    authStatus.textContent = `✓ Signed in as ${user.email} (UID: ${user.uid})`;
    authStatus.style.color = '#6daa45';
    // Pre-fill the UID field with the signed-in user's UID
    if (!uidListEl.value.includes(user.uid)) {
      uidListEl.value = uidListEl.value
        ? uidListEl.value + ', ' + user.uid
        : user.uid;
    }
    dryRunBtn.disabled  = false;
    migrateBtn.disabled = false;
  } else {
    authStatus.textContent = 'Not signed in';
    authStatus.style.color = '#aaa';

    migrateBtn.disabled = true;

});

document.getElementById('signin-btn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) { log('Sign-in failed: ' + e.message, 'err'); }
});

document.getElementById('clear-btn').addEventListener('click', clearLog);

// ── Migration ─────────────────────────────────────────────────────────────
async function runMigration(dryRun) {
  clearLog();
  log(dryRun ? '=== DRY RUN (no writes) ===' : '=== LIVE MIGRATION ===', 'info');
  log('');

  const uids = uidListEl.value.split(',').map(s => s.trim()).filter(Boolean);
  if (!uids.length) { log('No UIDs entered. Add UIDs to the field above.', 'err'); return; }

  log(`Scanning ${uids.length} UID(s): ${uids.join(', ')}`, 'info');
  log('');

  let totalDocs = 0, totalMigrated = 0, totalUnknown = 0;

  for (const uid of uids) {
    let predsSnap;
    try {
      predsSnap = await getDocs(collection(db, 'users', uid, 'predictions'));
    } catch(e) {
      log(`  ERROR reading predictions for ${uid}: ${e.message}`, 'err');
      continue;
    }

    if (predsSnap.empty) {
      log(`── UID: ${uid}  →  0 predictions found`, 'warn');
      log('');
      continue;
    }

    let userMigrated = 0, userUnknown = 0, userOk = 0;
    log(`── UID: ${uid}  (${predsSnap.size} predictions)`, 'info');

    for (const predDoc of predsSnap.docs) {
      const oldId = predDoc.id;
      totalDocs++;

      if (CANONICAL_IDS.has(oldId)) { userOk++; continue; }

      const newId = resolveCanonical(oldId);
      if (!newId) {
        log(`  ⚠ UNRESOLVED: ${oldId}`, 'warn');
        userUnknown++; totalUnknown++;
        continue;
      }

      log(`  ${dryRun ? '[DRY]' : '[MIGRATE]'}  ${oldId}`, dryRun ? 'warn' : 'ok');
      log(`           →  ${newId}`, dryRun ? 'warn' : 'ok');
      userMigrated++; totalMigrated++;

      if (!dryRun) {
        const data = predDoc.data();
        await setDoc(doc(db, 'users', uid, 'predictions', newId), {
          ...data, migratedFrom: oldId, migratedAt: serverTimestamp(),
        });
        await deleteDoc(doc(db, 'users', uid, 'predictions', oldId));
      }
    }

    log(`  → ${userOk} already correct, ${userMigrated} need migration, ${userUnknown} unresolved`, '');
    log('');
  }

  log('══════════════════════════════════════', 'info');
  log(`Total docs scanned:  ${totalDocs}`, '');
  log(`To migrate:          ${totalMigrated}`, totalMigrated > 0 ? (dryRun ? 'warn' : 'ok') : '');
  log(`Unresolved:          ${totalUnknown}`, totalUnknown > 0 ? 'warn' : 'ok');
  if (!dryRun) log(totalMigrated > 0 ? '\n✓ Migration complete!' : '\n✓ Nothing to migrate.', 'ok');
  if (dryRun && totalMigrated > 0) log('\nClick "Run Migration" to apply.', 'info');
}

dryRunBtn.addEventListener('click', () => runMigration(true));
migrateBtn.addEventListener('click', async () => {
  if (!confirm('Write and delete Firestore docs. Proceed?')) return;
  migrateBtn.disabled = true;
  await runMigration(false);
  migrateBtn.disabled = false;
});
