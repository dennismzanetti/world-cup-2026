<body>
<h1>🔧 Prediction ID Migration</h1>
<p>Queries the flat <code>predictions</code> collection by <code>userId</code>, finds docs whose <code>matchId</code> field is stale, writes a corrected doc, and deletes the old one.</p>

// ── Canonical ID generator ────────────────────────────────────────────────
function slug(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}
function makeMatchId(date, home, away) {
  return `${date||'tbd'}-${slug(home)}-${slug(away)}`;
}

  {id:makeMatchId('2026-06-17','Portugal','Congo DR'),              home:'Portugal',             away:'Congo DR'},
  {id:makeMatchId('2026-06-17','Uzbekistan','Colombia'),            home:'Uzbekistan',           away:'Colombia'},
  {id:makeMatchId('2026-06-23','Portugal','Uzbekistan'),            home:'Portugal',             away:'Uzbekistan'},

  {id:makeMatchId('2026-06-17','England','Croatia'),                home:'England',              away:'Croatia'},
  {id:makeMatchId('2026-06-17','Ghana','Panama'),                   home:'Ghana',                away:'Panama'},
  {id:makeMatchId('2026-06-23','England','Ghana'),                  home:'England',              away:'Ghana'},
  {id:makeMatchId('2026-06-23','Panama','Croatia'),                 home:'Panama',               away:'Croatia'},
  {id:makeMatchId('2026-06-27','Panama','England'),                 home:'Panama',               away:'England'},
  {id:makeMatchId('2026-06-27','Croatia','Ghana'),                  home:'Croatia',              away:'Ghana'},
  // Knockout
  {id:'r32-1'},{id:'r32-2'},{id:'r32-3'},{id:'r32-4'},
  {id:'r32-5'},{id:'r32-6'},{id:'r32-7'},{id:'r32-8'},
  {id:'r32-9'},{id:'r32-10'},{id:'r32-11'},{id:'r32-12'},
  {id:'r32-13'},{id:'r32-14'},{id:'r32-15'},{id:'r32-16'},
  {id:'r16-1'},{id:'r16-2'},{id:'r16-3'},{id:'r16-4'},
  {id:'r16-5'},{id:'r16-6'},{id:'r16-7'},{id:'r16-8'},
  {id:'qf-1'},{id:'qf-2'},{id:'qf-3'},{id:'qf-4'},
  {id:'sf-1'},{id:'sf-2'},{id:'tp-1'},{id:'final'},
];

const CANONICAL_IDS = new Set(CANONICAL_MATCHES.map(m => m.id));

// Build lookup: "date|homeslug|awayslug" (and reversed) -> canonical ID
const KEY_TO_CANONICAL = {};
CANONICAL_MATCHES.forEach(m => {
  if (!m.home) return;
  const d = m.id.split('-').slice(0,3).join('-');
  KEY_TO_CANONICAL[`${d}|${slug(m.home)}|${slug(m.away)}`] = m.id;
  KEY_TO_CANONICAL[`${d}|${slug(m.away)}|${slug(m.home)}`] = m.id;
});

function resolveCanonical(staleId) {
  if (CANONICAL_IDS.has(staleId)) return staleId;
  const m = staleId.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
  if (!m) return null;
  const datePart = m[1], parts = m[2].split('-');
  for (let i = 1; i < parts.length; i++) {
    const key = `${datePart}|${parts.slice(0,i).join('-')}|${parts.slice(i).join('-')}`;
    if (KEY_TO_CANONICAL[key]) return KEY_TO_CANONICAL[key];
  }
  return null;
}

// ── UI ────────────────────────────────────────────────────────────────────
const logEl      = document.getElementById('log');
const authStatus = document.getElementById('auth-status');
const dryRunBtn  = document.getElementById('dry-run-btn');
const migrateBtn = document.getElementById('migrate-btn');

function log(msg, cls='') {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

let currentUser = null;
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    authStatus.textContent = `✓ Signed in as ${user.email}  |  UID: ${user.uid}`;
    authStatus.style.color = '#6daa45';
    dryRunBtn.disabled  = false;
    migrateBtn.disabled = false;
  } else {
    authStatus.textContent = 'Not signed in';
    authStatus.style.color = '#aaa';
    dryRunBtn.disabled = migrateBtn.disabled = true;
  }
});

document.getElementById('signin-btn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) { log('Sign-in failed: ' + e.message, 'err'); }
});
document.getElementById('clear-btn').addEventListener('click', clearLog);

// ── Migration ─────────────────────────────────────────────────────────────
async function runMigration(dryRun) {
  clearLog();
  log(dryRun ? '=== DRY RUN (no writes) ===' : '=== LIVE MIGRATION ===', 'info');
  log('');

  if (!currentUser) { log('Not signed in.', 'err'); return; }
  const uid = currentUser.uid;
  log(`Signed-in UID: ${uid}`, 'info');
  log('Querying predictions collection where userId == uid...', 'info');
  log('');

  let predsSnap;
  try {
    const q = query(
      collection(db, 'predictions'),
      where('userId', '==', uid)
    );
    predsSnap = await getDocs(q);
  } catch(e) {
    log('ERROR querying predictions: ' + e.message, 'err');
    return;
  }

  if (predsSnap.empty) {
    log('No prediction docs found for this user.', 'warn');
    log('Tip: make sure the Firestore collection is named exactly "predictions"', 'warn');
    return;
  }

  log(`Found ${predsSnap.size} prediction doc(s).`, 'info');
  log('');

  let totalOk = 0, totalMigrated = 0, totalUnknown = 0;

  for (const predDoc of predsSnap.docs) {
    const data    = predDoc.data();
    // The matchId is stored both as the doc ID and as a field
    const oldDocId   = predDoc.id;
    const oldMatchId = data.matchId || oldDocId;  // fall back to doc ID if no field

    if (CANONICAL_IDS.has(oldMatchId)) {
      totalOk++;
      continue; // already canonical
    }

    const newMatchId = resolveCanonical(oldMatchId);
    if (!newMatchId) {
      log(`⚠ UNRESOLVED  doc=${oldDocId}  matchId=${oldMatchId}`, 'warn');
      totalUnknown++;
      continue;
    }

    // New doc ID: replace the matchId portion inside the old doc ID
    // Doc IDs are typically  userId_matchId  or  matchId  — handle both
    let newDocId;
    if (oldDocId.includes(oldMatchId)) {
      newDocId = oldDocId.replace(oldMatchId, newMatchId);
    } else {
      // Doc ID format unknown — just use newMatchId as doc ID
      newDocId = newMatchId;
    }

    log(`${dryRun ? '[DRY]' : '[MIGRATE]'}`, dryRun ? 'warn' : 'ok');
    log(`  old doc:     ${oldDocId}`, dryRun ? 'warn' : 'ok');
    log(`  old matchId: ${oldMatchId}`, dryRun ? 'warn' : 'ok');
    log(`  new doc:     ${newDocId}`, dryRun ? 'warn' : 'ok');
    log(`  new matchId: ${newMatchId}`, dryRun ? 'warn' : 'ok');
    log('', '');
    totalMigrated++;

    if (!dryRun) {
      await setDoc(doc(db, 'predictions', newDocId), {
        ...data,
        matchId: newMatchId,
        migratedFrom: oldDocId,
        migratedAt: serverTimestamp(),
      });
      await deleteDoc(doc(db, 'predictions', oldDocId));
    }
  }

  log('════════════════════════════════════', 'info');
  log(`Already canonical: ${totalOk}`, '');
  log(`To migrate:        ${totalMigrated}`, totalMigrated > 0 ? (dryRun ? 'warn' : 'ok') : '');
  log(`Unresolved:        ${totalUnknown}`, totalUnknown > 0 ? 'warn' : 'ok');

  if (dryRun && totalMigrated > 0)  log('\nClick “Run Migration” to apply changes.', 'info');
  if (dryRun && totalMigrated === 0) log('\n✓ Nothing to migrate — all matchIds are already canonical.', 'ok');
  if (!dryRun) log(totalMigrated > 0 ? '\n✓ Migration complete!' : '\n✓ Nothing to migrate.', 'ok');
}

dryRunBtn.addEventListener('click', () => runMigration(true));
migrateBtn.addEventListener('click', async () => {
  if (!confirm('This will write and delete Firestore documents. Proceed?')) return;
  migrateBtn.disabled = true;
  await runMigration(false);
  migrateBtn.disabled = false;
});
