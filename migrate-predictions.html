<h1>🔧 Prediction ID Migration</h1>
<p>This tool scans every user's predictions in Firestore, computes what the <strong>current</strong> match ID should be, and re-saves any docs whose IDs have drifted.</p>

<label>Sign in as admin first:</label>
<input id="email" type="email" placeholder="admin@email.com">
<input id="password" type="password" placeholder="password" style="margin-left:.5rem">
<br>
<button id="signin-btn">Sign In</button>

<br><br>

<button id="migrate-btn" disabled style="background:#964219">⚡ Run Migration</button>
<button id="clear-btn">Clear Log</button>

<div id="log"><span class="info">Sign in above, then click Dry Run to preview what will be migrated.</span></div>

// ── Canonical match ID generator (must stay in sync with data.js) ────────
function makeMatchId(date, homeName, awayName) {
  function slug(s) {
    return s
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '');
  }
  return `${date || 'tbd'}-${slug(homeName)}-${slug(awayName)}`;
}

  // Group E
  {id:makeMatchId('2026-06-14','Germany','Curaçao'),             home:'Germany',            away:'Curaçao'},
  {id:makeMatchId('2026-06-14','Ivory Coast','Ecuador'),         home:'Ivory Coast',        away:'Ecuador'},
  {id:makeMatchId('2026-06-20','Germany','Ivory Coast'),         home:'Germany',            away:'Ivory Coast'},

  {id:makeMatchId('2026-06-25','Ecuador','Germany'),             home:'Ecuador',            away:'Germany'},
  // Group F
  {id:makeMatchId('2026-06-14','Netherlands','Japan'),           home:'Netherlands',        away:'Japan'},
  {id:makeMatchId('2026-06-14','Sweden','Tunisia'),              home:'Sweden',             away:'Tunisia'},

  // Group J
  {id:makeMatchId('2026-06-16','Argentina','Algeria'),           home:'Argentina',          away:'Algeria'},
  {id:makeMatchId('2026-06-16','Austria','Jordan'),              home:'Austria',            away:'Jordan'},
  {id:makeMatchId('2026-06-22','Argentina','Austria'),           home:'Argentina',          away:'Austria'},
  {id:makeMatchId('2026-06-22','Jordan','Algeria'),              home:'Jordan',             away:'Algeria'},
  {id:makeMatchId('2026-06-27','Algeria','Austria'),             home:'Algeria',            away:'Austria'},

  {id:makeMatchId('2026-06-17','Portugal','Congo DR'),           home:'Portugal',           away:'Congo DR'},
  {id:makeMatchId('2026-06-17','Uzbekistan','Colombia'),         home:'Uzbekistan',         away:'Colombia'},
  {id:makeMatchId('2026-06-23','Portugal','Uzbekistan'),         home:'Portugal',           away:'Uzbekistan'},

  {id:makeMatchId('2026-06-27','Colombia','Portugal'),           home:'Colombia',           away:'Portugal'},
  {id:makeMatchId('2026-06-27','Congo DR','Uzbekistan'),         home:'Congo DR',           away:'Uzbekistan'},
  // Group L
  {id:makeMatchId('2026-06-17','England','Croatia'),             home:'England',            away:'Croatia'},
  {id:makeMatchId('2026-06-17','Ghana','Panama'),                home:'Ghana',              away:'Panama'},
  {id:makeMatchId('2026-06-23','England','Ghana'),               home:'England',            away:'Ghana'},
  {id:makeMatchId('2026-06-23','Panama','Croatia'),              home:'Panama',             away:'Croatia'},
  {id:makeMatchId('2026-06-27','Panama','England'),              home:'Panama',             away:'England'},
  {id:makeMatchId('2026-06-27','Croatia','Ghana'),               home:'Croatia',            away:'Ghana'},
  // Knockout stage IDs are stable strings — no migration needed for those
  {id:'r32-1'}, {id:'r32-2'}, {id:'r32-3'}, {id:'r32-4'},
  {id:'r32-5'}, {id:'r32-6'}, {id:'r32-7'}, {id:'r32-8'},
  {id:'r32-9'}, {id:'r32-10'},{id:'r32-11'},{id:'r32-12'},
  {id:'r32-13'},{id:'r32-14'},{id:'r32-15'},{id:'r32-16'},
  {id:'r16-1'}, {id:'r16-2'}, {id:'r16-3'}, {id:'r16-4'},
  {id:'r16-5'}, {id:'r16-6'}, {id:'r16-7'}, {id:'r16-8'},
  {id:'qf-1'},  {id:'qf-2'},  {id:'qf-3'},  {id:'qf-4'},
  {id:'sf-1'},  {id:'sf-2'},  {id:'tp-1'},  {id:'final'},
];

const CANONICAL_IDS = new Set(CANONICAL_MATCHES.map(m => m.id));

// Build a lookup: normalised key → canonical ID
// Key = date + slug(home) + slug(away)  (same algo as makeMatchId)
// Also try swapped home/away in case old data stored them reversed
const KEY_TO_CANONICAL = {};
CANONICAL_MATCHES.forEach(m => {
  if (!m.home) return; // knockout entries — skip, IDs are already stable
  KEY_TO_CANONICAL[m.id] = m.id; // identity (already canonical)
  // extract date portion from the canonical ID
  const datePart = m.id.split('-').slice(0,3).join('-');
  function slug(s) {
    return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  }
  // forward: home|away
  KEY_TO_CANONICAL[`${datePart}|${slug(m.home)}|${slug(m.away)}`] = m.id;
  // reversed: away|home  (in case old code had them swapped)
  KEY_TO_CANONICAL[`${datePart}|${slug(m.away)}|${slug(m.home)}`] = m.id;
});

// Given a stale doc ID, try to find the canonical ID it corresponds to
function resolveCanonical(staleId) {
  if (CANONICAL_IDS.has(staleId)) return staleId; // already canonical
  // The stale ID is date-slug-slug; extract date + two team slugs
  // Format: YYYY-MM-DD-<homeslug>-<awayslug>
  const m = staleId.match(/^(\d{4}-\d{2}-\d{2})-(.+)$/);
  if (!m) return null;
  const datePart = m[1];
  const rest     = m[2]; // e.g. 'germany-curacao-ivory-coast-ecuador'
  // Try all possible split points between home and away slugs
  const parts = rest.split('-');
  for (let i = 1; i < parts.length; i++) {
    const homeSlug = parts.slice(0, i).join('-');
    const awaySlug = parts.slice(i).join('-');
    const key = `${datePart}|${homeSlug}|${awaySlug}`;
    if (KEY_TO_CANONICAL[key]) return KEY_TO_CANONICAL[key];
  }
  return null;
}

// ── UI helpers ───────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(msg, cls = '') {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

// ── Auth ─────────────────────────────────────────────────────────────────
const signinBtn  = document.getElementById('signin-btn');
const dryRunBtn  = document.getElementById('dry-run-btn');
const migrateBtn = document.getElementById('migrate-btn');
const authStatus = document.getElementById('auth-status');

onAuthStateChanged(auth, user => {
  if (user) {
    authStatus.textContent = `✓ Signed in as ${user.email}`;
    authStatus.style.color = '#6daa45';
    dryRunBtn.disabled  = false;
    migrateBtn.disabled = false;
  } else {
    authStatus.textContent = 'Not signed in';
    authStatus.style.color = '#aaa';
    dryRunBtn.disabled  = true;
    migrateBtn.disabled = true;
  }
});

signinBtn.addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  signinBtn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pw);
    log('Signed in successfully.', 'ok');
  } catch(e) {
    log('Sign-in failed: ' + e.message, 'err');
  }
  signinBtn.disabled = false;
});

document.getElementById('clear-btn').addEventListener('click', () => clearLog());

// ── Core migration logic ─────────────────────────────────────────────────
async function runMigration(dryRun) {
  clearLog();
  log(dryRun ? '=== DRY RUN (no writes) ===' : '=== LIVE MIGRATION ===', 'info');
  log('');

  let totalUsers = 0, totalDocs = 0, totalMigrated = 0, totalUnknown = 0;

  // List all users by scanning users collection
  const usersSnap = await getDocs(collection(db, 'users'));
  totalUsers = usersSnap.size;
  log(`Found ${totalUsers} user(s) in Firestore.`, 'info');
  log('');

  for (const userDoc of usersSnap.docs) {
    const uid = userDoc.id;
    const predsSnap = await getDocs(collection(db, 'users', uid, 'predictions'));
    if (predsSnap.empty) continue;

    let userMigrated = 0, userUnknown = 0, userOk = 0;
    log(`── User: ${uid} (${predsSnap.size} predictions)`, 'info');

    for (const predDoc of predsSnap.docs) {
      const oldId = predDoc.id;
      totalDocs++;

      if (CANONICAL_IDS.has(oldId)) {
        userOk++;
        continue; // already correct
      }

      const newId = resolveCanonical(oldId);
      if (!newId) {
        log(`  ⚠ UNKNOWN: ${oldId}`, 'warn');
        userUnknown++;
        totalUnknown++;
        continue;
      }

      log(`  ${dryRun ? '[DRY]' : '[MIGRATE]'} ${oldId}  →  ${newId}`, dryRun ? 'warn' : 'ok');
      userMigrated++;
      totalMigrated++;

      if (!dryRun) {
        const data = predDoc.data();
        // Write new doc
        await setDoc(doc(db, 'users', uid, 'predictions', newId), {
          ...data,
          migratedFrom: oldId,
          migratedAt: serverTimestamp(),
        });
        // Delete old doc
        await deleteDoc(doc(db, 'users', uid, 'predictions', oldId));
      }
    }

    log(`  → ${userOk} already correct, ${userMigrated} to migrate, ${userUnknown} unresolved`, '');
    log('');
  }

  log('══════════════════════════════════════', 'info');
  log(`Users scanned:   ${totalUsers}`, '');
  log(`Docs scanned:    ${totalDocs}`, '');
  log(`Will migrate:    ${totalMigrated}`, totalMigrated > 0 ? 'ok' : '');
  log(`Unresolved:      ${totalUnknown}`, totalUnknown > 0 ? 'warn' : 'ok');
  if (dryRun && totalMigrated > 0) {
    log('');
    log('Run the live migration to apply these changes.', 'info');
  } else if (!dryRun) {
    log('');
    log(totalMigrated > 0 ? '✓ Migration complete!' : '✓ Nothing to migrate — all IDs were already canonical.', 'ok');
  }
}

dryRunBtn.addEventListener('click',  () => runMigration(true));
migrateBtn.addEventListener('click', async () => {
  if (!confirm('This will write and delete Firestore documents. Proceed?')) return;
  migrateBtn.disabled = true;
  await runMigration(false);
  migrateBtn.disabled = false;
});
</script>
